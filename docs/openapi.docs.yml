openapi: 3.0.3
info:
  title: MikMongo ISP Management API
  description: |
    Comprehensive ISP management platform for MikroTik router integration,
    customer management, billing, payments, hotspot voucher sales, and agent management.

    ## Authentication
    - **Admin API**: Bearer JWT token via `Authorization: Bearer <token>`
    - **Customer Portal**: Portal JWT token via `Authorization: Bearer <token>`
    - **Agent Portal**: Agent Portal JWT token via `Authorization: Bearer <token>`

    ## Response Envelope
    All responses use a standard envelope:
    ```json
    {
      "success": true,
      "data": { ... },
      "error": "error message (on failure)",
      "meta": { "total": 100, "limit": 50, "offset": 0 }
    }
    ```
  version: 1.0.0
  contact:
    name: MikMongo Team

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
    description: Health check
  - name: Auth
    description: Authentication (public + admin)
  - name: Users
    description: Admin user management
  - name: Customers
    description: Customer management
  - name: Registrations
    description: Customer registration management
  - name: Routers
    description: MikroTik router management
  - name: Bandwidth Profiles
    description: Bandwidth profile (plan) management
  - name: Subscriptions
    description: Customer subscription management
  - name: Invoices
    description: Invoice / billing management
  - name: Payments
    description: Payment management
  - name: Webhooks
    description: Payment gateway webhooks
  - name: Customer Portal
    description: Customer self-service portal
  - name: Agent Portal
    description: Sales agent self-service portal
  - name: Sales Agents
    description: Sales agent management
  - name: Agent Invoices
    description: Agent invoice management
  - name: Hotspot Sales
    description: Hotspot voucher sales
  - name: Cash Management
    description: Cash entry and petty cash fund management
  - name: Reports
    description: Business reports
  - name: System Settings
    description: System settings management
  - name: MikroTik PPP
    description: MikroTik PPP profiles, secrets, and active connections
  - name: MikroTik Hotspot
    description: MikroTik hotspot profiles, users, active sessions, hosts, servers
  - name: MikroTik Network
    description: MikroTik queues, firewall, IP pools and addresses
  - name: MikroTik Monitor
    description: MikroTik system resource and interface monitoring
  - name: MikroTik Raw
    description: Raw RouterOS command execution
  - name: Mikhmon Vouchers
    description: Mikhmon hotspot voucher generation and management
  - name: Mikhmon Profiles
    description: Mikhmon hotspot profile management
  - name: Mikhmon Reports
    description: Mikhmon sales reports
  - name: Mikhmon Expire
    description: Mikhmon user expiration monitoring

# ─── Security Schemes ───────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin JWT token
    PortalAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Customer portal JWT token
    AgentPortalAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Agent portal JWT token

  # ─── Reusable Parameters ──────────────────────────────────────────
  parameters:
    RouterIdPath:
      name: router_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: MikroTik router ID
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource ID
    NamePath:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Resource name
    MikrotikIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: MikroTik internal ID (e.g. *1)
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 500
      description: Number of items to return
    OffsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Number of items to skip

  # ─── Reusable Schemas ─────────────────────────────────────────────
  schemas:
    # ── Response Envelope ──
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        meta:
          $ref: '#/components/schemas/Meta'

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string

    Meta:
      type: object
      properties:
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer

    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            message:
              type: string

    # ── Auth ──
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
        new_password:
          type: string
          minLength: 8

    # ── User ──
    CreateUserRequest:
      type: object
      required: [full_name, email, role, password]
      properties:
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        role:
          type: string
          enum: [superadmin, admin, cs, billing, technician, readonly]
        password:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [superadmin, admin, cs, billing, technician, readonly]
        is_active:
          type: boolean
        last_login:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Customer ──
    CreateCustomerRequest:
      type: object
      required: [full_name, phone]
      properties:
        full_name:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        plan_id:
          type: string
          format: uuid
          description: Optional bandwidth profile ID to auto-create subscription
        router_id:
          type: string
          format: uuid
        username:
          type: string
        password:
          type: string
        static_ip:
          type: string

    UpdateCustomerRequest:
      type: object
      properties:
        full_name:
          type: string
        username:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        id_card_number:
          type: string
        notes:
          type: string
        tags:
          type: array
          items:
            type: string
        is_active:
          type: boolean

    CustomerResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customer_code:
          type: string
        full_name:
          type: string
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        id_card_number:
          type: string
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        is_active:
          type: boolean
        notes:
          type: string
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Registration ──
    CreateRegistrationRequest:
      type: object
      required: [full_name, phone]
      properties:
        full_name:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        notes:
          type: string
        bandwidth_profile_id:
          type: string
          format: uuid

    ApproveRegistrationRequest:
      type: object
      required: [router_id]
      properties:
        router_id:
          type: string
          format: uuid
        profile_id:
          type: string
          format: uuid

    RejectRegistrationRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    RegistrationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        notes:
          type: string
        bandwidth_profile_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, approved, rejected]
        rejection_reason:
          type: string
        approved_by:
          type: string
          format: uuid
        approved_at:
          type: string
          format: date-time
        customer_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Router ──
    CreateRouterRequest:
      type: object
      required: [name, address, username, password]
      properties:
        name:
          type: string
        address:
          type: string
        username:
          type: string
        password:
          type: string
        area:
          type: string
        api_port:
          type: integer
          default: 8728
        rest_port:
          type: integer
          default: 80
        use_ssl:
          type: boolean
          default: false
        is_master:
          type: boolean
          default: false
        notes:
          type: string

    UpdateRouterRequest:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        username:
          type: string
        password:
          type: string
        area:
          type: string
        api_port:
          type: integer
        rest_port:
          type: integer
        use_ssl:
          type: boolean
        is_master:
          type: boolean
        notes:
          type: string

    RouterResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        area:
          type: string
        api_port:
          type: integer
        rest_port:
          type: integer
        username:
          type: string
        use_ssl:
          type: boolean
        is_master:
          type: boolean
        is_active:
          type: boolean
        status:
          type: string
          enum: [online, offline, unknown]
        last_seen_at:
          type: string
          format: date-time
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Bandwidth Profile ──
    CreateBandwidthProfileRequest:
      type: object
      required: [profile_code, name, download_speed, upload_speed, price_monthly]
      properties:
        profile_code:
          type: string
        name:
          type: string
        description:
          type: string
        download_speed:
          type: integer
          format: int64
          minimum: 1
        upload_speed:
          type: integer
          format: int64
          minimum: 1
        price_monthly:
          type: number
          format: double
          minimum: 0.01
        tax_rate:
          type: number
          format: double
        billing_cycle:
          type: string
          enum: [daily, weekly, monthly, yearly]
        billing_day:
          type: integer
        grace_period_days:
          type: integer
        isolate_profile_name:
          type: string
        sort_order:
          type: integer
        is_visible:
          type: boolean
        mt_local_address:
          type: string
        mt_remote_address:
          type: string
        mt_parent_queue:
          type: string
        mt_queue_type:
          type: string
        mt_dns_server:
          type: string
        mt_session_timeout:
          type: string
        mt_idle_timeout:
          type: string

    UpdateBandwidthProfileRequest:
      type: object
      properties:
        profile_code:
          type: string
        name:
          type: string
        description:
          type: string
        download_speed:
          type: integer
          format: int64
        upload_speed:
          type: integer
          format: int64
        price_monthly:
          type: number
          format: double
        tax_rate:
          type: number
          format: double
        billing_cycle:
          type: string
          enum: [daily, weekly, monthly, yearly]
        billing_day:
          type: integer
        grace_period_days:
          type: integer
        isolate_profile_name:
          type: string
        sort_order:
          type: integer
        is_visible:
          type: boolean
        is_active:
          type: boolean
        mt_local_address:
          type: string
        mt_remote_address:
          type: string
        mt_parent_queue:
          type: string
        mt_queue_type:
          type: string
        mt_dns_server:
          type: string
        mt_session_timeout:
          type: string
        mt_idle_timeout:
          type: string

    PPPProfileInfo:
      type: object
      properties:
        rate_limit:
          type: string
        local_address:
          type: string
        remote_address:
          type: string
        parent_queue:
          type: string
        queue_type:
          type: string
        dns_server:
          type: string
        session_timeout:
          type: string
        idle_timeout:
          type: string

    BandwidthProfileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        router_id:
          type: string
          format: uuid
        profile_code:
          type: string
        name:
          type: string
        description:
          type: string
        download_speed:
          type: integer
          format: int64
        upload_speed:
          type: integer
          format: int64
        price_monthly:
          type: number
          format: double
        tax_rate:
          type: number
          format: double
        billing_cycle:
          type: string
          enum: [daily, weekly, monthly, yearly]
        billing_day:
          type: integer
        is_active:
          type: boolean
        is_visible:
          type: boolean
        sort_order:
          type: integer
        grace_period_days:
          type: integer
        isolate_profile_name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        mikrotik:
          $ref: '#/components/schemas/PPPProfileInfo'

    # ── Subscription ──
    CreateSubscriptionRequest:
      type: object
      required: [customer_id, plan_id, username]
      properties:
        customer_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        username:
          type: string
        password:
          type: string
        static_ip:
          type: string
        gateway:
          type: string
        billing_day:
          type: integer
        auto_isolate:
          type: boolean
          default: true
        grace_period_days:
          type: integer
        notes:
          type: string
        mt_service:
          type: string
        mt_local_address:
          type: string
        mt_routes:
          type: string
        mt_limit_bytes_in:
          type: integer
          format: int64
        mt_limit_bytes_out:
          type: integer
          format: int64

    UpdateSubscriptionRequest:
      type: object
      properties:
        plan_id:
          type: string
          format: uuid
        password:
          type: string
        static_ip:
          type: string
        gateway:
          type: string
        billing_day:
          type: integer
        auto_isolate:
          type: boolean
        grace_period_days:
          type: integer
        notes:
          type: string
        mt_service:
          type: string
        mt_local_address:
          type: string
        mt_routes:
          type: string
        mt_limit_bytes_in:
          type: integer
          format: int64
        mt_limit_bytes_out:
          type: integer
          format: int64

    PPPSecretInfo:
      type: object
      properties:
        service:
          type: string
        profile:
          type: string
        local_address:
          type: string
        remote_address:
          type: string
        routes:
          type: string
        limit_bytes_in:
          type: integer
          format: int64
        limit_bytes_out:
          type: integer
          format: int64
        disabled:
          type: boolean

    SubscriptionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        router_id:
          type: string
          format: uuid
        username:
          type: string
        static_ip:
          type: string
        gateway:
          type: string
        status:
          type: string
          enum: [pending, active, suspended, isolated, expired, terminated]
        activated_at:
          type: string
          format: date-time
        expiry_date:
          type: string
          format: date
        billing_day:
          type: integer
        auto_isolate:
          type: boolean
        grace_period_days:
          type: integer
        suspend_reason:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        mikrotik:
          $ref: '#/components/schemas/PPPSecretInfo'

    # ── Invoice ──
    InvoiceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoice_number:
          type: string
        customer_id:
          type: string
          format: uuid
        subscription_id:
          type: string
          format: uuid
        billing_period_start:
          type: string
          format: date
        billing_period_end:
          type: string
          format: date
        billing_month:
          type: integer
        billing_year:
          type: integer
        issue_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        payment_deadline:
          type: string
          format: date
        subtotal:
          type: number
          format: double
        tax_amount:
          type: number
          format: double
        discount_amount:
          type: number
          format: double
        late_fee:
          type: number
          format: double
        total_amount:
          type: number
          format: double
        paid_amount:
          type: number
          format: double
        balance:
          type: number
          format: double
        status:
          type: string
          enum: [draft, sent, unpaid, partial, paid, overpaid, overdue, cancelled, refunded]
        payment_date:
          type: string
          format: date
        payment_method:
          type: string
        invoice_type:
          type: string
          enum: [recurring, installation, additional, refund]
        is_auto_generated:
          type: boolean
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Payment ──
    CreatePaymentRequest:
      type: object
      required: [customer_id, amount, payment_method, payment_date]
      properties:
        customer_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0.01
        payment_method:
          type: string
          enum: [cash, bank_transfer, e-wallet, credit_card, debit_card, check, qris, gateway]
        payment_date:
          type: string
          format: date
        bank_name:
          type: string
        bank_account_number:
          type: string
        bank_account_name:
          type: string
        transaction_reference:
          type: string
        ewallet_provider:
          type: string
        ewallet_number:
          type: string
        proof_image:
          type: string
        notes:
          type: string

    RejectPaymentRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    RefundPaymentRequest:
      type: object
      required: [amount, reason]
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
        reason:
          type: string

    PaymentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        payment_number:
          type: string
        customer_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        allocated_amount:
          type: number
          format: double
        remaining_amount:
          type: number
          format: double
        payment_method:
          type: string
          enum: [cash, bank_transfer, e-wallet, credit_card, debit_card, check, qris, gateway]
        payment_date:
          type: string
          format: date
        bank_name:
          type: string
        bank_account_number:
          type: string
        bank_account_name:
          type: string
        transaction_reference:
          type: string
        ewallet_provider:
          type: string
        ewallet_number:
          type: string
        gateway_name:
          type: string
        gateway_trx_id:
          type: string
        proof_image:
          type: string
        receipt_number:
          type: string
        status:
          type: string
          enum: [pending, confirmed, rejected, refunded]
        processed_at:
          type: string
          format: date-time
        rejection_reason:
          type: string
        refund_amount:
          type: number
          format: double
        refund_date:
          type: string
          format: date
        refund_reason:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Sales Agent ──
    CreateSalesAgentRequest:
      type: object
      required: [router_id, name, username, password]
      properties:
        router_id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        username:
          type: string
        password:
          type: string
          minLength: 6
        status:
          type: string
          enum: [active, inactive]
        voucher_mode:
          type: string
          enum: [mix, num, alp]
        voucher_length:
          type: integer
        voucher_type:
          type: string
          enum: [upp, up]
        bill_discount:
          type: number
          format: double
        billing_cycle:
          type: string
          enum: [weekly, monthly]
        billing_day:
          type: integer
          minimum: 1
          maximum: 31

    UpdateSalesAgentRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        password:
          type: string
        status:
          type: string
          enum: [active, inactive]
        voucher_mode:
          type: string
          enum: [mix, num, alp]
        voucher_length:
          type: integer
        voucher_type:
          type: string
          enum: [upp, up]
        bill_discount:
          type: number
          format: double
        billing_cycle:
          type: string
          enum: [weekly, monthly]
        billing_day:
          type: integer
          minimum: 1
          maximum: 31

    SalesAgentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        router_id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        username:
          type: string
        status:
          type: string
          enum: [active, inactive]
        voucher_mode:
          type: string
          enum: [mix, num, alp]
        voucher_length:
          type: integer
        voucher_type:
          type: string
          enum: [upp, up]
        bill_discount:
          type: number
