services:
  influxdb:
    image: influxdb:3-core
    container_name: influxdb3-core
    ports:
      - "8181:8181"
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
    volumes:
      - ./influxdb3_data:/var/lib/influxdb3/data # bind mount — avoids named volume permission issues
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8181/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379" # port 6380 agar tidak bentrok dengan Redis utama di 6379
    volumes:
      - redis_monitor_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_monitor_data:
